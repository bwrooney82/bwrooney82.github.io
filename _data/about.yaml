# about me
first-paragraph: Hi! I am a first-year PhD student at <a href="https://mmlab.hk/" target="_blank" rel="noopener">MMLab@HKU</a>(The University of Hong Kong), advised by <a href="http://luoping.me/" target="_blank" rel="noopener">Prof.Ping Luo</a>.  I received my M.Eng. and B.Eng. degrees both from <a href="https://en.sjtu.edu.cn/" target="_blank" rel="noopener">SJTU</a>(Shanghai Jiao Tong University).

second-paragraph: I am currently a research intern at <a href="https://www.teleai.com.cn/product/AboutTeleAI_en" target="_blank" rel="noopener">TeleAI</a>, co-working with <a href="https://baichenjia.github.io/" target="_blank" rel="noopener">Dr. Chenjia Bai</a> and <a href="https://scholar.google.com/citations?user=ahUibskAAAAJ&hl=en" target="_blank" rel="noopener">Prof. Xuelong Li</a> to advance research on humanoid whole-body control.

third-paragraph: Feel free to contact me for any discussions or collaborations via <a href="mailto:bwln010802@gmail.com">email</a> or <a href="assets/img/wechat.png">wechat</a> !
