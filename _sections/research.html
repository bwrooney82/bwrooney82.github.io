<!-- Research section -->

<hr>
<div class="row" id="research">
    <div class="col">
        <h2 class="mb-4 publications-heading">📄 projects</h2>
        <p></p>
        <div id="filters-project" class="publications-filters">
            <button class="filter-button active" data-filter="*">all</button>
            {% for category in data.research.categories %}
                <button class="filter-button" data-filter="{{ category.data_filter }}">{{ category.category_name }}</button>
            {% endfor %}
        </div>
        <p></p>
        <div id="projects" class="isotope publications-inner">
            {% for project in data.research.projects %}
                {% include "_libs/research_widget.html" %}
            {% endfor %}
        </div>
        <p></p>
    </div>
</div>
