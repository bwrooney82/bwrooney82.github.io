<!-- News section -->

<hr>
<div class="row" id="news">
    <div class="col">
        <h2 class="mb-3" style="font-size: 1.5rem;">📰 news</h2>
        <ul class="list-unstyled news-list mb-0" style="font-size: 0.95rem;">
            {% for item in site.data.news.items %}
            <li class="news-list-item mb-2"><span class="news-list-date text-muted" style="font-size: 0.92em;">[{{ item.date }}]</span> {{ item.text }}</li>
            {% endfor %}
        </ul>
        <p></p>
    </div>
</div>
